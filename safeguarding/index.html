<style>
  :root{--navy:#29445F;--ink:#1A2633;--sage:#83C097;--cream:#F5F2EC;--grey:#6B7280;--line:#E4E7EB;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);
       min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-height:1.6;}
  em{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:600;}
  .top{display:flex;align-items:center;justify-content:space-between;padding:22px 30px;border-bottom:1px solid var(--line);}
  .brandline{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--navy);}
  .brandline span{color:var(--sage);}
  .back{font-size:13px;font-weight:500;color:var(--navy);text-decoration:none;}
  .back:hover{color:var(--sage);}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
  .card{max-width:560px;text-align:center;}
  .num{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--sage);}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--grey);margin-top:14px;}
  h1{font-size:clamp(34px,6vw,54px);line-height:1.03;font-weight:800;color:var(--navy);margin-top:10px;letter-spacing:-.01em;}
  .rule{height:3px;width:56px;background:var(--sage);margin:26px auto 0;border:0;}
  p.lead{margin-top:24px;font-size:17px;color:var(--navy);opacity:.85;}
  .status{margin-top:30px;display:inline-block;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
          color:var(--navy);border:1px solid var(--navy);border-radius:2px;padding:9px 18px;}
  footer{padding:22px 30px;border-top:1px solid var(--line);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);text-align:center;}
</style>
</head>

      <hr class="rule">
      <p class="lead">Concerns, contacts and a clear route.</p>
      <div class="status">In development</div>
    </div>
  </main>
  <footer>Sonoro &middot; ICON &middot; MPW Culinary Academy &middot; Allison Park Holdings</footer>
</body>
